name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64, ARM64]
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: msbuild WinIconFinder.csproj /t:Restore /p:Platform=${{ matrix.platform }} /p:Configuration=${{ matrix.configuration }} /nologo /v:m

      - name: Build
        run: msbuild WinIconFinder.csproj /p:Platform=${{ matrix.platform }} /p:Configuration=${{ matrix.configuration }} /nologo /v:m
